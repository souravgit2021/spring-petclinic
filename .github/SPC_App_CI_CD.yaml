name: Spring_App_CI_CD
on: workflow_dispatch

jobs:
  CI_Job:
     runs-on: ubuntu-latest
     steps:
        - name: Code Check Out
          uses: actions/checkout@v4
          with:
            fetch-depth: 0 # Essential for SonarQube to calculate blame and code authorship

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: 'maven' # Speeds up builds by caching your .m2 repository

        - name: Cache SonarQube packages
          uses: actions/cache@v4
          with:
            path: ~/.sonar/cache
            key: ${{ runner.os }}-sonar
            restore-keys: ${{ runner.os }}-sonar

        - name: Build and Analyze
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          run:         - name: Build and Analyze
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          run: |
            mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=gh-action-hprofile -Dsonar.projectKey=gh-action-spc -Dsonar.token=${{ secrets.SONAR_TOKEN }}
